{% extends "base.html" %}
{% block title %}Editar Médico{% endblock %}

{% block content %}
<div class="main-container">

  <nav class="breadcrumb">
    <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
    <span class="sep">›</span>
    <a href="{{ url_for('admin.medicos') }}">Médicos</a>
    <span class="sep">›</span>
    <span>Editar</span>
  </nav>

  <div class="page-header">
    <p class="subtitulo"><i class="fa-solid fa-pen"></i> Editar Médico</p>
    <h1>Dr(a). {{ perfil.nombre }} {{ perfil.apellido }}</h1>
  </div>

  <div class="card">
    <div class="card-title">
      <i class="fa-solid fa-user-doctor"></i> Datos del Médico
    </div>

    <form method="POST"
          action="{{ url_for('admin.editar_medico', medico_id=perfil.id) }}"
          novalidate>

      <div class="form-grid">

        <div class="form-group full">
          <label class="form-label">Documento</label>
          <input type="text" class="form-control" value="{{ perfil.documento }}" disabled />
          <span class="form-hint">El documento no puede modificarse.</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="nombre">Nombres <span>*</span></label>
          <input type="text" id="nombre" name="nombre" class="form-control"
                 value="{{ perfil.nombre }}" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="apellido">Apellidos <span>*</span></label>
          <input type="text" id="apellido" name="apellido" class="form-control"
                 value="{{ perfil.apellido }}" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="especialidad">Especialidad <span>*</span></label>
          <select id="especialidad" name="especialidad" class="form-control" required>
            {% for esp in especialidades %}
              <option value="{{ esp }}"
                {% if perfil.especialidad == esp %}selected{% endif %}>
                {{ esp }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="telefono">Teléfono <span>*</span></label>
          <input type="tel" id="telefono" name="telefono" class="form-control"
                 value="{{ perfil.telefono }}" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="correo">Correo <span>*</span></label>
          <input type="email" id="correo" name="correo" class="form-control"
                 value="{{ perfil.correo }}" required />
        </div>

        <div class="form-group full">
          <label class="form-label" for="direccion_eps">Dirección EPS <span>*</span></label>
          <input type="text" id="direccion_eps" name="direccion_eps" class="form-control"
                 value="{{ perfil.direccion_eps }}" maxlength="150" required />
        </div>

      </div>

      <hr class="divider" />

      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-lg">
          <i class="fa-solid fa-floppy-disk"></i> Guardar Cambios
        </button>
        <a href="{{ url_for('admin.medicos') }}" class="btn btn-secondary">Cancelar</a>
      </div>

    </form>
  </div>
</div>
{% endblock %}
