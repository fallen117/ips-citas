{% extends "base.html" %}
{% block title %}Registro{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-card-header">
      <div class="auth-logo"><i class="fa-solid fa-user-plus"></i></div>
      <h1 class="auth-titulo">Crear cuenta</h1>
      <p class="auth-subtitulo">Regístrate como paciente para reservar citas</p>
    </div>

    <form method="POST" action="{{ url_for('auth.registro') }}" novalidate>

      <div class="form-seccion-titulo">
        <i class="fa-solid fa-lock"></i> Datos de acceso
      </div>

      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label" for="documento">Número de Documento <span>*</span></label>
          <input type="text" id="documento" name="documento" class="form-control"
                 placeholder="Ej: 1012345678" maxlength="15"
                 value="{{ datos.get('documento','') }}" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña <span>*</span></label>
          <div class="input-password-wrap">
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="Mín. 8 caracteres" required />
            <button type="button" class="btn-toggle-pwd" onclick="togglePwd('password', this)">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmar">Confirmar Contraseña <span>*</span></label>
          <div class="input-password-wrap">
            <input type="password" id="confirmar" name="confirmar" class="form-control"
                   placeholder="Repite la contraseña" required />
            <button type="button" class="btn-toggle-pwd" onclick="togglePwd('confirmar', this)">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="form-seccion-titulo" style="margin-top:1.5rem;">
        <i class="fa-solid fa-user"></i> Información personal
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="nombre">Nombres <span>*</span></label>
          <input type="text" id="nombre" name="nombre" class="form-control"
                 placeholder="Ej: María José" value="{{ datos.get('nombre','') }}" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="apellido">Apellidos <span>*</span></label>
          <input type="text" id="apellido" name="apellido" class="form-control"
                 placeholder="Ej: Rodríguez García" value="{{ datos.get('apellido','') }}" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="telefono">Teléfono <span>*</span></label>
          <input type="tel" id="telefono" name="telefono" class="form-control"
                 placeholder="Ej: 3001234567" value="{{ datos.get('telefono','') }}" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="correo">Correo Electrónico <span>*</span></label>
          <input type="email" id="correo" name="correo" class="form-control"
                 placeholder="Ej: usuario@correo.com" value="{{ datos.get('correo','') }}" required />
        </div>
        <div class="form-group full">
          <label class="form-label" for="eps">EPS Asignada <span>*</span></label>
          <select id="eps" name="eps" class="form-control" required>
            <option value="">-- Selecciona tu EPS --</option>
            {% for eps_item in lista_eps %}
              <option value="{{ eps_item }}"
                {% if datos.get('eps') == eps_item %}selected{% endif %}>
                {{ eps_item }}
              </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-actions" style="margin-top:1.5rem;">
        <button type="submit" class="btn btn-primary btn-lg">
          <i class="fa-solid fa-check"></i> Crear mi cuenta
        </button>
        <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">Cancelar</a>
      </div>

    </form>

    <div class="auth-footer">
      ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión aquí</a>
    </div>

  </div>
</div>

{% block scripts %}
<script>
function togglePwd(id, btn) {
  const input = document.getElementById(id);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.innerHTML = isHidden
    ? '<i class="fa-regular fa-eye-slash"></i>'
    : '<i class="fa-regular fa-eye"></i>';
}
</script>
{% endblock %}
{% endblock %}
